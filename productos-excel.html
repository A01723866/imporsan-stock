<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImporSan - Productos (vista tipo Excel)</title>
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <nav class="impor-san-nav" aria-label="Navegación principal">
    <a href="index.html" class="impor-san-nav-link">Carga de archivos</a>
    <a href="productos-excel.html" class="impor-san-nav-link impor-san-nav-link-current">Productos</a>
  </nav>
  <main class="impor-san-page impor-san-excel-page">
    <h1 class="impor-san-title">Productos</h1>
    <p class="impor-san-subtitle">Vista tipo hoja de cálculo</p>

    <div class="impor-san-excel-wrap">
      <div class="impor-san-excel-scroll">
        <table class="impor-san-excel-grid" role="grid" aria-label="Tabla de productos">
          <thead>
            <tr>
              <th class="impor-san-excel-corner" scope="col"></th>
              <th class="impor-san-excel-col-header" scope="col">Nombre</th>
              <th class="impor-san-excel-col-header" scope="col">SKU</th>
              <th class="impor-san-excel-col-header" scope="col">Mercado Libre</th>
              <th class="impor-san-excel-col-header" scope="col">Amazon</th>
              <th class="impor-san-excel-col-header" scope="col">Spakio</th>
              <th class="impor-san-excel-col-header" scope="col">Total</th>
            </tr>
          </thead>
          <tbody id="impor-san-productos-excel-tbody">
            <!-- Filas generadas por productos-excel-render.js desde productos-excel-data.js -->
          </tbody>
        </table>
      </div>
    </div>
  </main>
  <script type="module" src="src/js/productos-excel-render.js"></script>
</body>
</html>
